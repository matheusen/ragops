# ══════════════════════════════════════════════════════════
#  Article Scraper — Configuração (Selenium puro)
#  Acessa os sites diretamente com browser automatizado.
# ══════════════════════════════════════════════════════════

# ── Browser ──────────────────────────────────────────────
browser:
  headless: true          # false = ver o browser em tempo real
  window_width: 1400
  window_height: 900
  page_load_timeout: 30   # segundos
  implicit_wait: 5

# ── Diretórios de saída ──────────────────────────────────
output:
  base_dir: "./results"
  metadata_dir: "metadata"
  downloads_dir: "downloads"
  reports_dir: "reports"
  screenshots_dir: "screenshots"   # screenshots em caso de erro

# ── Persistência ─────────────────────────────────────────
mongodb:
  enabled: true
  uri: "mongodb://localhost:27017"
  database: "ragflow"
  collection: "scraped_articles"
  gridfs_collection: "scraped_article_files"

kafka:
  enabled: true
  bootstrap_servers:
    - "localhost:9092"
  topic: "article-scraper.articles"
  group_id: "article-scraper-downloaders"
  auto_offset_reset: "earliest"
  consumer_timeout_ms: 5000
  idle_timeout_sec: 0
  max_poll_records: 20
  linger_ms: 100
  retries: 5
  acks: "all"

