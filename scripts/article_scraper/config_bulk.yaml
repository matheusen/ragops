# ── Fontes ────────────────────────────────────────────────────────────────────
sources:

  # arXiv API — melhor fonte para bulk: sem bot detection, open access,
  # PDF sempre disponível, 3s de delay obrigatório entre requests.
  arxiv:
    enabled: true
    max_per_query: 100        # arXiv API suporta até 100 por página
    sort: "relevance"         # relevance | lastUpdatedDate | submittedDate
    start_year: 2019

  # Semantic Scholar — API Graph, 1 req/s sem chave (gratuito).
  # Com chave (signup gratuito em semanticscholar.org/product/api):
  #   adicione header: X-API-KEY=<sua_chave>  → 10 req/s
  semantic_scholar:
    enabled: true
    max_per_query: 100        # máximo da API sem chave
    start_year: 2019
    sort: "Relevance"

  # PapersWithCode — ML/AI focado, links diretos para PDFs no arXiv.
  # Selenium, mas sem bot detection agressivo.
  paperswithcode:
    enabled: true
    max_per_query: 50
    start_year: 2019

  # CORE — agregador open access, muitos PDFs disponíveis gratuitamente.
  core:
    enabled: true
    max_per_query: 50
    start_year: 2019

  # DBLP — CS bibliography, rápido, sem bot detection.
  dblp:
    enabled: true
    max_per_query: 30
    start_year: 2019

  # IEEE — tem bot detection; usar com cautela em bulk.
  # Habilite apenas se tiver acesso institucional.
  ieee:
    enabled: false            # desabilitado no bulk — bot detection agressivo
    max_per_query: 20
    start_year: 2019
    extra_delay: 5

  # ACM — tem captcha em volume alto.
  acm:
    enabled: false            # desabilitado no bulk
    max_per_query: 20
    start_year: 2019

  # Springer — ok para consultas moderadas.
  springer:
    enabled: false            # desabilitado no bulk — slow
    max_per_query: 20
    start_year: 2019
    discipline: "Computer Science"

  # ScienceDirect — artigos pagos na maioria.
  sciencedirect:
    enabled: false
    max_per_query: 15
    start_year: 2019

  # CAPES — requer VPN universitária.
  capes:
    enabled: false
    max_per_query: 20
    start_year: 2019

# ── Download de PDFs ──────────────────────────────────────────────────────────
downloads:
  enabled: true
  open_access_only: true      # bulk: baixa só open access (evita falhas de autenticação)
  timeout: 60
  max_total: 0                # 0 = sem limite

# ── Controles de execução ─────────────────────────────────────────────────────
execution:
  delay_min: 1.5
  delay_max: 3.0
  delay_between_queries: 4
  skip_existing: true         # essencial em bulk — não re-processa DOIs já coletados
  min_year: 2019
  max_total_articles: 0       # 0 = sem limite (colete tudo)
  screenshot_on_error: false  # desativa screenshots em bulk para economizar disco
