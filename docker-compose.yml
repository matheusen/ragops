# ─────────────────────────────────────────────────────────────────────────────
# Infraestrutura — Jira Issue Validation RAG
#
# Subir tudo (sem GPU):              docker compose up -d
# Isso sobe: Qdrant, Neo4j, MongoDB e Ollama.
# MonkeyOCR existe neste compose, mas fica em profile separado (`gpu`).
# Motivo: ele requer clone local do repositorio MonkeyOCR + GPU NVIDIA.
# Por padrao, este compose usa o clone vizinho em `../MonkeyOCR`.
# Se quiser outro caminho, defina `MONKEYOCR_SRC` no `.env`.
#
# Subir serviço individual:          docker compose up qdrant -d
# Subir Qdrant + Neo4j:              docker compose up qdrant neo4j -d
# Subir MongoDB (dashboard):         docker compose up mongodb -d
# MonkeyOCR (requer GPU NVIDIA):     docker compose --profile gpu up monkeyocr --build -d
#
# Ver README.md → "Infraestrutura com Docker" para configuração detalhada.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Qdrant — vector store para dense + sparse retrieval ─────────────────────
  # REST API:  http://localhost:6333  →  QDRANT_URL=http://localhost:6333
  # Dashboard: http://localhost:6333/dashboard
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: ragops-qdrant
    ports:
      - "6333:6333"   # REST + WebUI
      - "6334:6334"   # gRPC (opcional)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j — graph store para GraphRAG ───────────────────────────────────────
  # Browser:  http://localhost:7474   (neo4j / senha configurada abaixo)
  # Bolt:     bolt://localhost:7687   →  NEO4J_URL=bolt://localhost:7687
  # Altere NEO4J_AUTH para uma senha segura antes de usar em produção.
  neo4j:
    image: neo4j:5
    container_name: ragops-neo4j
    ports:
      - "7474:7474"   # Browser HTTP
      - "7687:7687"   # Bolt (driver Python)
    environment:
      NEO4J_AUTH: neo4j/neo4j_change_me
      # NEO4J_PLUGINS: '["apoc"]'   # descomente se precisar de APOC
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j_change_me", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MongoDB — persistência opcional do dashboard Next.js ────────────────────
  # URI:  mongodb://localhost:27017   →  MONGODB_URI=mongodb://localhost:27017
  mongodb:
    image: mongo:7
    container_name: ragops-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama — provider LLM 100% local com aceleração por GPU NVIDIA ──────────
  # API: http://localhost:11434   →  OLLAMA_BASE_URL=http://localhost:11434
  # Baixar modelo após subir:
  #   docker exec -it ragops-ollama ollama pull llama3.1:8b
  #   docker exec -it ragops-ollama ollama pull qwen2.5:7b
  # Requer Docker Desktop/Engine com suporte NVIDIA Container Toolkit.
  ollama:
    image: ollama/ollama:latest
    container_name: ragops-ollama
    ports:
      - "11434:11434"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ── Piston — execução de código em sandbox (Java, Python, JS, etc.) ─────────
  # API: http://localhost:2000   →  PISTON_URL=http://localhost:2000
  # Instalar Java após subir:
  #   curl -s http://localhost:2000/api/v2/runtimes | jq '.[].language'
  # (Java já vem pré-instalado na imagem ghcr.io/engineer-man/piston)
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: ragops-piston
    ports:
      - "2000:2000"
    volumes:
      - piston_data:/piston/packages
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2000/api/v2/runtimes"]
      interval: 15s
      timeout: 8s
      retries: 5

  # ── MonkeyOCR v1.5 — extração de PDFs complexos (SRR paradigm) ──────────────
  # Este servico ESTA no docker compose.
  # Ele nao sobe no `docker compose up -d` padrao porque:
  #   1. depende de GPU NVIDIA
  #   2. o build usa o clone local do MonkeyOCR
  #
  # Não há imagem pré-compilada no Docker Hub; o container é construído localmente.
  #
  # PRÉ-REQUISITO (fazer apenas uma vez):
  #   git clone https://github.com/Yuliang-Liu/MonkeyOCR ../MonkeyOCR
  #
  # Subir (requer GPU NVIDIA ≥ 8 GB VRAM):
  #   docker compose --profile gpu up monkeyocr --build -d
  # Ver logs:
  #   docker compose --profile gpu logs -f monkeyocr
  #
  # API: http://localhost:8001  →  MONKEYOCR_API_URL=http://localhost:8001
  # Sem GPU: não suba este serviço; o sistema usa Docling → pypdf → Tesseract.
  monkeyocr:
    profiles: ["gpu"]
    build:
      context: ${MONKEYOCR_SRC:-../MonkeyOCR}  # clone local do MonkeyOCR
      dockerfile: docker/Dockerfile     # Dockerfile oficial do projeto MonkeyOCR
      args:
        LMDEPLOY_PATCHED: "true"
    container_name: ragops-monkeyocr
    command: ["fastapi"]
    ports:
      - "8001:7861"
    environment:
      # MonkeyOCR-pro-1.2B  → ~4 GB VRAM, rápido, recomendado
      # MonkeyOCR-chat-8B   → ~16 GB VRAM, maior precisão em fórmulas densas
      MODEL_NAME: MonkeyOCR-pro-1.2B
      FASTAPI_HOST: 0.0.0.0
      FASTAPI_PORT: 7861
      TMPDIR: /app/tmp
      CUDA_VISIBLE_DEVICES: 0
      HF_HUB_CACHE: /app/MonkeyOCR/model_weight
      MODELSCOPE_CACHE: /app/MonkeyOCR/model_weight
    volumes:
      - monkeyocr_models:/app/MonkeyOCR/model_weight
      - monkeyocr_output:/app/output    # artefatos extraídos salvos aqui
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  mongodb_data:
  ollama_data:
  piston_data:
  monkeyocr_models:
  monkeyocr_output:
